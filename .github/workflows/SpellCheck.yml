name: "Spell Check"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  spellcheck:
    name: "Spell Check"
    uses: "SciML/.github/.github/workflows/spellcheck.yml@v1"
    secrets: "inherit"
